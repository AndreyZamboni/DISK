<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avaliação DISC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f1; color: #1a1814; min-height: 100vh; }

  /* INTRO */
  #s-intro { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
  #s-intro h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 600; margin-bottom: .75rem; }
  #s-intro p  { color: #6b6762; font-size: 1rem; max-width: 420px; margin-bottom: 2rem; }
  .disc-pills { display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem; }
  .dp { width: 40px; height: 40px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .dp-d{background:#c94f27} .dp-i{background:#c4860a} .dp-s{background:#1a8c61} .dp-c{background:#1a60a8}

  .form-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; }
  input[type=text] { padding: 13px 16px; border: 1.5px solid #ddd8d0; border-radius: 10px; font-size: 15px; outline: none; background: #fff; }
  input[type=text]:focus { border-color: #c94f27; }
  .btn { padding: 14px 28px; border-radius: 10px; border: none; background: #1a1814; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: .35; cursor: default; }
  .info-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 1.5rem; }
  .itag { background: #fff; border: 1px solid #e0dbd2; border-radius: 20px; padding: 5px 12px; font-size: 13px; color: #6b6762; }

  /* QUIZ */
  #s-quiz { display: none; min-height: 100vh; }
  .quiz-header { background: #fff; border-bottom: 1px solid #e8e3da; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 9; }
  .quiz-logo { font-weight: 700; font-size: 17px; letter-spacing: .05em; }
  .prog-wrap { flex: 1; max-width: 260px; }
  .prog-track { height: 5px; background: #e8e3da; border-radius: 20px; overflow: hidden; }
  .prog-fill { height: 100%; background: #c94f27; border-radius: 20px; transition: width .4s; }
  .prog-txt { font-size: 12px; color: #6b6762; margin-top: 4px; text-align: right; }
  .quiz-body { max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem; }
  .q-num { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #6b6762; margin-bottom: .75rem; }
  .q-text { font-size: clamp(1.1rem, 3vw, 1.5rem); font-weight: 600; line-height: 1.4; margin-bottom: 1.75rem; }
  .opts { display: grid; gap: 10px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1.5px solid #e0dbd2; border-radius: 12px; background: #fff; cursor: pointer; text-align: left; transition: border-color .2s, background .2s; }
  .opt:hover { border-color: #b0aba3; }
  .opt-dot { display: none; }
  .opt-txt { font-size: 14px; line-height: 1.55; }
  .opt.sel-D { border-color: #c94f27; background: #fef3ee; }
  .opt.sel-I { border-color: #c4860a; background: #fef9ee; }
  .opt.sel-S { border-color: #1a8c61; background: #eef8f4; }
  .opt.sel-C { border-color: #1a60a8; background: #eef3fb; }
  .quiz-nav { display: flex; justify-content: space-between; margin-top: 2rem; }
  .btn-sec { padding: 11px 22px; border-radius: 10px; border: 1.5px solid #e0dbd2; background: #fff; font-size: 14px; cursor: pointer; }
  .btn-sec:hover { background: #f5f4f1; }
  .btn-sec:disabled { opacity: .3; cursor: default; }

  /* RESULT */
  #s-result { display: none; min-height: 100vh; }
  .res-hero { padding: 3.5rem 1.5rem 2.5rem; text-align: center; }
  .res-orb { width: 80px; height: 80px; border-radius: 50%; color: #fff; font-size: 36px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .res-hero h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 700; margin-bottom: .4rem; }
  .res-hero p  { color: #6b6762; font-size: .95rem; }
  .res-body { max-width: 640px; margin: 0 auto; padding: 0 1.5rem 4rem; }
  .card { background: #fff; border: 1px solid #e0dbd2; border-radius: 14px; padding: 1.4rem; margin-bottom: 1rem; }
  .card h3 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #6b6762; margin-bottom: 1rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-l { font-weight: 700; font-size: 14px; width: 16px; }
  .bar-n { font-size: 13px; color: #6b6762; width: 110px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: #f0ede8; border-radius: 20px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 20px; width: 0; transition: width 1.2s cubic-bezier(.4,0,.2,1); }
  .bar-pct { font-size: 13px; color: #6b6762; width: 36px; text-align: right; }
  .desc { font-size: 15px; line-height: 1.75; color: #333; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: .75rem; }
  .tag { font-size: 13px; padding: 5px 12px; border-radius: 20px; border: 1px solid #e0dbd2; color: #6b6762; background: #f5f4f1; }
  .tag.hi { color: #fff; border-color: transparent; }
  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width:500px){ .duo{grid-template-columns:1fr} }
  .res-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }
  .btn-copy { padding: 12px 22px; border-radius: 10px; border: 1.5px solid #e0dbd2; background: #fff; font-size: 14px; cursor: pointer; }
  .btn-copy:hover { background: #f5f4f1; }
</style>
</head>
<body>

<!-- INTRO -->
<section id="s-intro">
  <div class="disc-pills">
    <div class="dp dp-d">D</div>
    <div class="dp dp-i">I</div>
    <div class="dp dp-s">S</div>
    <div class="dp dp-c">C</div>
  </div>
  <h1>Avaliação de perfil DISC</h1>
  <p>Responda com honestidade como você age no dia a dia no trabalho. Não há resposta certa ou errada.</p>
  <div class="form-group">
    <input type="text" id="inp-nome" placeholder="Seu nome completo" />
    <input type="text" id="inp-cargo" placeholder="Cargo / função (opcional)" />
    <button class="btn" onclick="startQuiz()">Iniciar avaliação →</button>
  </div>
  <div class="info-tags">
    <span class="itag">10 perguntas</span>
    <span class="itag">~3 minutos</span>
    <span class="itag">Resultado imediato</span>
  </div>
</section>

<!-- QUIZ -->
<section id="s-quiz">
  <div class="quiz-header">
    <div class="quiz-logo">DISC</div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
      <div class="prog-txt" id="prog-txt">1 de 10</div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
    <div class="quiz-nav">
      <button class="btn-sec" id="btn-prev" onclick="nav(-1)">← Anterior</button>
      <button class="btn" id="btn-next" onclick="nav(1)" disabled>Próxima →</button>
    </div>
  </div>
</section>

<!-- RESULT -->
<section id="s-result">
  <div class="res-hero">
    <div class="res-orb" id="res-orb"></div>
    <h1 id="res-title"></h1>
    <p id="res-sub"></p>
  </div>
  <div class="res-body">
    <div class="card">
      <h3>Distribuição do perfil</h3>
      <div id="bars"></div>
    </div>
    <div class="card">
      <h3>Como você age</h3>
      <p class="desc" id="res-desc"></p>
    </div>
    <div class="duo">
      <div class="card">
        <h3>Pontos fortes</h3>
        <div class="tags" id="res-strong"></div>
      </div>
      <div class="card">
        <h3>Oportunidades</h3>
        <div class="tags" id="res-dev"></div>
      </div>
    </div>
    <div class="card">
      <h3>Dica para o líder</h3>
      <p class="desc" id="res-tip"></p>
    </div>
    <div class="res-actions">
      <button class="btn-copy" onclick="copyRes()">📋 Copiar resultado</button>
      <button class="btn" onclick="restart()">Nova avaliação</button>
    </div>
  </div>
</section>

<script>
const QS = [
  { q: "Quando enfrento um desafio, prefiro:", opts: [
    { t: "Agir imediatamente e encontrar a solução mais rápida", d: "D" },
    { t: "Conversar com o time e motivar todos a resolverem juntos", d: "I" },
    { t: "Seguir os processos estabelecidos com cuidado", d: "S" },
    { t: "Analisar todas as informações antes de decidir", d: "C" }
  ]},
  { q: "No dia a dia, as pessoas me descrevem como:", opts: [
    { t: "Direto(a), determinado(a) e orientado(a) a resultados", d: "D" },
    { t: "Entusiasmado(a), sociável e inspirador(a)", d: "I" },
    { t: "Calmo(a), confiável e colaborativo(a)", d: "S" },
    { t: "Cuidadoso(a), metódico(a) e preciso(a)", d: "C" }
  ]},
  { q: "Em reuniões de equipe, costumo:", opts: [
    { t: "Liderar a discussão e definir a direção rapidamente", d: "D" },
    { t: "Animar o grupo e gerar ideias criativas", d: "I" },
    { t: "Ouvir atentamente e apoiar o consenso do grupo", d: "S" },
    { t: "Trazer dados, fatos e questionar detalhes", d: "C" }
  ]},
  { q: "Quando recebo uma tarefa nova, minha primeira reação é:", opts: [
    { t: "Assumir o controle e começar a executar", d: "D" },
    { t: "Compartilhar com o time e pensar em como engajar todos", d: "I" },
    { t: "Verificar como isso se encaixa nos processos existentes", d: "S" },
    { t: "Pesquisar e planejar antes de qualquer ação", d: "C" }
  ]},
  { q: "Meu maior ponto forte no trabalho é:", opts: [
    { t: "Foco em resultados e capacidade de decisão rápida", d: "D" },
    { t: "Comunicação e habilidade de influenciar pessoas", d: "I" },
    { t: "Paciência, lealdade e criação de um ambiente harmonioso", d: "S" },
    { t: "Qualidade, precisão e atenção aos detalhes", d: "C" }
  ]},
  { q: "Quando há conflito no time, geralmente:", opts: [
    { t: "Enfrento diretamente e busco uma solução rápida", d: "D" },
    { t: "Busco mediar com leveza e manter o clima positivo", d: "I" },
    { t: "Prefiro evitar conflito e buscar harmonia", d: "S" },
    { t: "Analiso as causas e apresento uma solução lógica", d: "C" }
  ]},
  { q: "O que mais me motiva profissionalmente é:", opts: [
    { t: "Alcançar metas, vencer desafios e ter autonomia", d: "D" },
    { t: "Reconhecimento, interação social e liberdade criativa", d: "I" },
    { t: "Estabilidade, colaboração e ver o time bem", d: "S" },
    { t: "Qualidade do trabalho, aprendizado e processos claros", d: "C" }
  ]},
  { q: "Quando cometo um erro, minha tendência é:", opts: [
    { t: "Reconhecer rapidamente, corrigir e seguir em frente", d: "D" },
    { t: "Comentar com alguém e pedir perspectivas diferentes", d: "I" },
    { t: "Me preocupar com o impacto nos outros e buscar ajuda", d: "S" },
    { t: "Analisar o que deu errado para não repetir", d: "C" }
  ]},
  { q: "Em relação ao ritmo de trabalho, prefiro:", opts: [
    { t: "Velocidade e variedade de desafios constantes", d: "D" },
    { t: "Ambiente dinâmico com muita interação e novidades", d: "I" },
    { t: "Rotina previsível com mudanças graduais", d: "S" },
    { t: "Tempo adequado para fazer tudo com qualidade", d: "C" }
  ]},
  { q: "Como prefiro receber feedback:", opts: [
    { t: "Direto, objetivo e focado em melhoria de resultados", d: "D" },
    { t: "Com elogio, de forma positiva e em público quando possível", d: "I" },
    { t: "Em particular, de forma gentil e construtiva", d: "S" },
    { t: "Com dados concretos, exemplos e de forma estruturada", d: "C" }
  ]}
];

const PROFILES = {
  D: {
    name: "Dominante", color: "#c94f27",
    desc: "Perfil orientado a resultados, direto e decisivo. Gosta de desafios, autonomia e ambientes de alta performance. Lidera com energia e foco em metas. Pode ser impaciente com processos lentos ou excesso de detalhes.",
    strong: ["Foco em resultados", "Decisão rápida", "Liderança assertiva", "Alta energia"],
    dev: ["Escuta ativa", "Paciência com processos", "Empatia com o time"],
    tip: "Dê autonomia, metas claras e desafios constantes. Evite microgerenciamento. Feedback direto e objetivo funciona melhor com esse perfil."
  },
  I: {
    name: "Influente", color: "#c4860a",
    desc: "Perfil comunicativo, entusiasta e orientado a pessoas. Tem facilidade de engajar e inspirar equipes. Costuma ser criativo e otimista. Pode ter dificuldade com tarefas repetitivas ou que exijam muita atenção a detalhes.",
    strong: ["Comunicação", "Influência", "Criatividade", "Entusiasmo"],
    dev: ["Organização", "Follow-up de tarefas", "Foco em dados"],
    tip: "Reconheça publicamente, envolva em projetos colaborativos e criativos. Evite isolamento. Mostre como o trabalho dele(a) impacta pessoas."
  },
  S: {
    name: "Estável", color: "#1a8c61",
    desc: "Perfil paciente, leal e colaborativo. Valoriza relacionamentos e harmonia no ambiente de trabalho. Excelente em criar estabilidade e apoiar o time. Pode resistir a mudanças rápidas ou situações de alta pressão.",
    strong: ["Confiabilidade", "Trabalho em equipe", "Paciência", "Lealdade"],
    dev: ["Proatividade", "Adaptação a mudanças", "Assertividade"],
    tip: "Dê segurança e previsibilidade. Explique o porquê das mudanças com antecedência. Feedback em particular, de forma gentil e construtiva."
  },
  C: {
    name: "Consciencioso", color: "#1a60a8",
    desc: "Perfil analítico, meticuloso e orientado à qualidade. Valoriza precisão, dados e processos bem estruturados. Excelente em planejamento e análise crítica. Pode ser perfeccionista e cauteloso em excesso.",
    strong: ["Análise crítica", "Qualidade", "Planejamento", "Precisão"],
    dev: ["Velocidade de decisão", "Flexibilidade", "Comunicação interpessoal"],
    tip: "Forneça dados, processos claros e tempo adequado para análise. Feedback estruturado com exemplos concretos. Evite pressão por decisões rápidas sem informação suficiente."
  }
};

let cur = 0, ans = {}, nome = '', cargo = '';

function startQuiz() {
  nome = document.getElementById('inp-nome').value.trim();
  if (!nome) { document.getElementById('inp-nome').focus(); return; }
  cargo = document.getElementById('inp-cargo').value.trim();
  document.getElementById('s-intro').style.display = 'none';
  document.getElementById('s-quiz').style.display = 'block';
  render();
}

function render() {
  const q = QS[cur];
  document.getElementById('q-num').textContent = 'Pergunta ' + (cur + 1);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog').style.width = ((cur + 1) / QS.length * 100) + '%';
  document.getElementById('prog-txt').textContent = (cur + 1) + ' de ' + QS.length;

  let html = '';
  q.opts.forEach((o, i) => {
    const sel = ans[cur] === i ? 'opt sel-' + o.d : 'opt';
    html += `<div class="${sel}" onclick="pick(${i},'${o.d}')">
      <div class="opt-dot dot-${o.d}"></div>
      <div class="opt-txt">${o.t}</div>
    </div>`;
  });
  document.getElementById('opts').innerHTML = html;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = ans[cur] === undefined;
  const isLast = cur === QS.length - 1;
  document.getElementById('btn-next').textContent = isLast ? 'Ver resultado →' : 'Próxima →';
}

function pick(idx, disc) {
  ans[cur] = { idx, disc };
  render();
}

function nav(dir) {
  if (dir === 1 && cur === QS.length - 1) { showResult(); return; }
  cur = Math.max(0, Math.min(QS.length - 1, cur + dir));
  render();
}

function showResult() {
  const scores = { D:0, I:0, S:0, C:0 };
  Object.values(ans).forEach(a => scores[a.disc]++);
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const pr = PROFILES[top];
  const total = QS.length;

  document.getElementById('s-quiz').style.display = 'none';
  document.getElementById('s-result').style.display = 'block';

  document.getElementById('res-orb').style.background = pr.color;
  document.getElementById('res-orb').textContent = top;
  document.getElementById('res-title').textContent = pr.name;
  document.getElementById('res-sub').textContent = nome + (cargo ? ' · ' + cargo : '');

  // bars
  const LABELS = { D:'Dominante', I:'Influente', S:'Estável', C:'Consciencioso' };
  let bhtml = '';
  ['D','I','S','C'].forEach(k => {
    const pct = Math.round(scores[k]/total*100);
    bhtml += `<div class="bar-row">
      <div class="bar-l" style="color:${PROFILES[k].color}">${k}</div>
      <div class="bar-n">${LABELS[k]}</div>
      <div class="bar-track"><div class="bar-fill" id="bf-${k}" style="background:${PROFILES[k].color}"></div></div>
      <div class="bar-pct">${pct}%</div>
    </div>`;
  });
  document.getElementById('bars').innerHTML = bhtml;
  setTimeout(() => {
    ['D','I','S','C'].forEach(k => {
      const pct = Math.round(scores[k]/total*100);
      document.getElementById('bf-'+k).style.width = pct + '%';
    });
  }, 80);

  document.getElementById('res-desc').textContent = pr.desc;
  document.getElementById('res-strong').innerHTML = pr.strong.map(s => `<span class="tag hi" style="background:${pr.color}">${s}</span>`).join('');
  document.getElementById('res-dev').innerHTML = pr.dev.map(s => `<span class="tag">${s}</span>`).join('');
  document.getElementById('res-tip').textContent = pr.tip;

  window._resultText = `RESULTADO DISC — ${nome}${cargo ? ' ('+cargo+')' : ''}\n\nPerfil dominante: ${top} — ${pr.name}\n\nPontuação:\n${['D','I','S','C'].map(k=>`  ${k} ${LABELS[k]}: ${Math.round(scores[k]/total*100)}%`).join('\n')}\n\nDescrição:\n${pr.desc}\n\nPontos fortes: ${pr.strong.join(', ')}\nOportunidades: ${pr.dev.join(', ')}\n\nDica para o líder:\n${pr.tip}`;

  // Enviar para Formspree
  fetch('https://formspree.io/f/xaqvrwaj', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      nome: nome,
      cargo: cargo || '—',
      perfil_dominante: top + ' — ' + pr.name,
      D_Dominante:      Math.round(scores.D/total*100) + '%',
      I_Influente:      Math.round(scores.I/total*100) + '%',
      S_Estavel:        Math.round(scores.S/total*100) + '%',
      C_Consciencioso:  Math.round(scores.C/total*100) + '%',
      pontos_fortes:    pr.strong.join(', '),
      oportunidades:    pr.dev.join(', '),
      data:             new Date().toLocaleString('pt-BR')
    })
  }).catch(() => {});
}

function copyRes() {
  navigator.clipboard.writeText(window._resultText || '').then(() => alert('Resultado copiado!'));
}

function restart() {
  cur = 0; ans = {};
  document.getElementById('s-result').style.display = 'none';
  document.getElementById('s-intro').style.display = 'flex';
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-cargo').value = '';
}
</script>
</body>
</html>
